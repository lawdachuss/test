name: Secure RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Windows RDP
        shell: powershell
        run: |
          Write-Host "Enabling RDP..."

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force

          Write-Host "RDP enabled."

      - name: Create RDP User
        shell: powershell
        run: |
          Write-Host "Creating RDP user..."

          $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'
          $password = -join ((1..20) | ForEach-Object {
            $chars[(Get-Random -Maximum $chars.Length)]
          })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name "RDP"
          }

          New-LocalUser `
            -Name "RDP" `
            -Password $securePass `
            -AccountNeverExpires `
            -PasswordNeverExpires

          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "RDP user created."

      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..."

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $installer `
            -UseBasicParsing

          Start-Process msiexec.exe `
            -ArgumentList "/i `"$installer`" /qn /norestart" `
            -Wait

          Remove-Item $installer -Force

          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tailscale)) {
            Write-Error "Tailscale binary not found after install"
            exit 1
          }

          Write-Host "Tailscale installed."

      - name: Connect Tailscale Through iPhone Exit Node
        shell: powershell
        run: |
          Write-Host "Connecting to Tailscale..."

          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"

          $svc = Get-Service -Name Tailscale -ErrorAction SilentlyContinue
          if ($null -eq $svc) {
            Write-Error "Tailscale service not found"
            exit 1
          }

          if ($svc.Status -ne 'Running') {
            Write-Host "Starting Tailscale service..."
            Start-Service Tailscale -ErrorAction Stop
          } else {
            Write-Host "Tailscale service already running."
          }

          Write-Host "Waiting for Tailscale daemon..."
          $ready = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $out = & $tailscale status 2>&1
              if ($LASTEXITCODE -eq 0 -or ($out -match "Logged out|NeedsLogin|Running|stopped")) {
                $ready = $true
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
          }

          if (-not $ready) {
            Write-Error "Tailscale daemon did not become ready after 30s"
            exit 1
          }

          Write-Host "Authenticating and setting exit node in one command..."

          & $tailscale up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false `
            --exit-node=100.83.59.107 `
            --exit-node-allow-lan-access `
            --timeout=30s `
            --reset

          if ($LASTEXITCODE -ne 0) {
            Write-Error "tailscale up failed - check TAILSCALE_AUTH_KEY is valid and not expired"
            exit 1
          }

          Write-Host "Waiting for exit node route to settle..."
          Start-Sleep -Seconds 5

          Write-Host "-------- TAILSCALE STATUS --------"
          & $tailscale status
          Write-Host "----------------------------------"

          Write-Host "-------- EXIT NODE CHECK --------"
          $exitInfo = & $tailscale status 2>&1
          if ($exitInfo -match "100.76.189.99") {
            Write-Host "Exit node 100.76.189.99 is present in status."
          } else {
            Write-Warning "Exit node 100.76.189.99 not visible in status - check iPhone Tailscale exit node toggle."
          }
          Write-Host "---------------------------------"

          $ip = $null
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $candidate = (& $tailscale ip -4 2>&1 | Select-Object -First 1).Trim()
              if ($candidate -match '^\d+\.\d+\.\d+\.\d+$') {
                $ip = $candidate
                break
              }
            } catch {}
            Start-Sleep -Seconds 3
          }

          if (-not $ip) {
            Write-Error "No Tailscale IP assigned after 45s"
            exit 1
          }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $ip"

      - name: Verify Exit Node Public IP
        shell: powershell
        run: |
          Write-Host "-------- PUBLIC IP CHECK --------"

          try {
            $ip1 = Invoke-RestMethod "https://api.ipify.org" -TimeoutSec 15
            Write-Host "Public IP (ipify)  : $ip1"
          } catch {
            Write-Warning "ipify failed: $_"
          }

          try {
            $ip2 = Invoke-RestMethod "https://ifconfig.me/ip" -TimeoutSec 15
            Write-Host "Public IP (ifconfig): $ip2"
          } catch {
            Write-Warning "ifconfig.me failed: $_"
          }

          try {
            $ip3 = (Invoke-RestMethod "https://ipinfo.io/json" -TimeoutSec 15)
            Write-Host "IP info            : $($ip3.ip) / $($ip3.org) / $($ip3.country)"
          } catch {
            Write-Warning "ipinfo.io failed: $_"
          }

          Write-Host "---------------------------------"
          Write-Host "Compare the above IP to your iPhone carrier/WiFi IP."
          Write-Host "If it shows a GitHub/Azure IP, the exit node is not routing correctly."
          Write-Host "---------------------------------"

      - name: Verify RDP Port
        shell: powershell
        run: |
          Write-Host "Checking RDP on $env:TAILSCALE_IP:3389..."

          $success = $false

          for ($i = 0; $i -lt 10; $i++) {
            $test = Test-NetConnection `
              -ComputerName $env:TAILSCALE_IP `
              -Port 3389 `
              -WarningAction SilentlyContinue

            if ($test.TcpTestSucceeded) {
              $success = $true
              break
            }

            Write-Host "Attempt $($i+1)/10 failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }

          if (-not $success) {
            Write-Error "RDP port 3389 not reachable on $env:TAILSCALE_IP after 100s"
            exit 1
          }

          Write-Host "RDP reachable."

      - name: Show Connection Details
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "-------- RDP READY --------"
          Write-Host ""
          Write-Host "IP       : $env:TAILSCALE_IP"
          Write-Host "Username : RDP"
          Write-Host "Password : $env:RDP_PASSWORD"
          Write-Host ""
          Write-Host "---------------------------"
          Write-Host ""

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Keeping runner alive for ~6 hours..."

          $endTime = (Get-Date).AddMinutes(355)

          while ((Get-Date) -lt $endTime) {
            Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] Runner active..."

            for ($i = 0; $i -lt 6; $i++) {
              Start-Sleep -Seconds 10
            }
          }

          Write-Host "Session timeout reached. Shutting down gracefully."
